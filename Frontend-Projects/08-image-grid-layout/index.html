<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="image-grid">
      <img src="./images/photo-1.avif" alt="A foggy beach with a large rock formation in the foreground" title="A foggy beach with a large rock formation in the foreground">
      <img src="./images/photo-2.avif" alt="A living room with a white couch and a round window" title="A living room with a white couch and a round window">
      <img src="./images/photo-3.avif" alt="A table topped with plates and bowls of food" title="A table topped with plates and bowls of food">
      <img src="./images/photo-4.avif" alt="A building with a red door and a tree in front of it" title="A building with a red door and a tree in front of it">
      <img src="./images/photo-5.avif" alt="A row of white apartment buildings next to a street" title="A row of white apartment buildings next to a street">
      <img src="./images/photo-6.avif" alt="A view of a beach from the top of a hill" title="A view of a beach from the top of a hill">
    </div>
  </body>
</html>
